<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Success Lobby - CPCC</title>
    <!-- Login page - connects to Flask backend, falls back to demo mode -->
    <style>
        /* Reset - makes all browsers look the same */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* body is the entire page */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d1b2a;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The login card - controls the border & width */
        .login-card {
            background: #1a2f45;
            padding: 40px;
            border-radius: 16px;
            width: 380px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        /* Logo at the top */
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #4fc3f7;
            margin-bottom: 6px;
        }

        /* Small text below the logo */
        .subtitle {
            font-size: 13px;
            color: #90a4ae;
            margin-bottom: 30px;
        }

        /* Sign In / Create Account tabs */
        .tabs {
            display: flex;
            background: #0d1b2a;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 9px;
            border: none;
            background: transparent;
            color: #90a4ae;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
        }

        /* Active tab is highlighted */
        .tab-btn.active {
            background: #4fc3f7;
            color: #0d1b2a;
        }

        /* Input fields */
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 8px;
            border: 1px solid #2e4a63;
            background: #0d1b2a;
            color: white;
            font-size: 14px;
        }

        /* Blue border when you click inside an input */
        input:focus {
            outline: none;
            border-color: #4fc3f7;
        }

        /* Login / Register button */
        .btn-login {
            width: 100%;
            padding: 13px;
            background: #4fc3f7;
            color: #0d1b2a;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 4px;
        }

        .btn-login:hover {
            background: #81d4fa;
        }

        /* Demo mode banner - shows when server is offline */
        .demo-banner {
            background: rgba(255, 200, 0, 0.1);
            border: 1px solid #ffc800;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 16px;
            font-size: 12px;
            color: #ffc800;
            display: none;
        }

        /* Terms text at the bottom */
        .terms {
            font-size: 12px;
            color: #90a4ae;
            margin-top: 20px;
        }

        .terms a {
            color: #4fc3f7;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-card">

        <!-- Logo and college name -->
        <div class="logo">🎓 The Success Lobby</div>
        <div class="subtitle">Central Piedmont Community College</div>

        <!-- Shows when running without the server -->
        <div class="demo-banner" id="demo-banner">
            ⚡ DEMO MODE — Use any username & password
        </div>

        <!-- Sign In / Create Account tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
            <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
        </div>

        <!-- Login form -->
        <div id="loginForm">
            <input type="text" id="username" placeholder="CPCC Email (e.g. student@email.cpcc.edu)" />
            <input type="password" id="password" placeholder="Password" />
            <button class="btn-login" onclick="login()">Log In</button>
        </div>

        <!-- Register form -->
        <div id="registerForm" style="display:none;">
            <input type="text" id="regName" placeholder="Full Name" />
            <input type="text" id="regEmail" placeholder="CPCC Email (e.g. jdoe@email.cpcc.edu)" />
            <input type="password" id="regPassword" placeholder="Password" />
            <input type="password" id="regConfirm" placeholder="Confirm Password" />
            <button class="btn-login" onclick="register()">Create Account</button>
        </div>

        <p class="terms">
            By logging in you agree to our <a href="#">Terms & Policy</a>
        </p>

    </div>

    <script>
        /* Login function - tries the server first, falls back to demo mode */
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            /* Check if either field is empty */
            if (user === '' || pass === '') {
                alert('Please enter your username and password.');
                return;
            }

            /* Try to connect to the server */
            fetch('http://127.0.0.1:5000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: user, password: pass })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    /* Server login worked - save real user data */
                    localStorage.setItem('cpcc-user', data.name);
                    localStorage.setItem('cpcc-email', data.email);
                    window.location.href = 'quiz.html';
                } else {
                    alert(data.message);
                }
            })
            .catch(function() {
                /* Server is offline - use demo mode */
                console.log('Server offline - demo mode login');
                localStorage.setItem('cpcc-user', user);
                localStorage.setItem('cpcc-email', user);
                window.location.href = 'quiz.html';
            });
        }

        /* Register function - tries the server, falls back to demo mode */
        function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            /* Check all fields are filled */
            if (name === '' || email === '' || password === '' || confirm === '') {
                alert('Please fill in all fields.');
                return;
            }

            /* Check that email looks like a CPCC email */
            if (!email.includes('cpcc.edu')) {
                alert('Please use your CPCC email (e.g. jdoe@email.cpcc.edu).');
                return;
            }

            /* Password must be at least 6 characters */
            if (password.length < 6) {
                alert('Password must be at least 6 characters.');
                return;
            }

            /* Make sure both passwords match */
            if (password !== confirm) {
                alert('Passwords do not match.');
                return;
            }

            /* Try to send to the server */
            fetch('http://127.0.0.1:5000/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, email: email, password: password, confirm: confirm })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    /* Account created - switch to login tab */
                    alert(data.message);
                    switchTab('login');
                } else {
                    alert(data.message);
                }
            })
            .catch(function() {
                /* Server offline - demo mode registration */
                console.log('Server offline - demo mode register');
                localStorage.setItem('cpcc-user', name);
                localStorage.setItem('cpcc-email', email);
                alert('⚡ Demo account created! Welcome, ' + name + '!');
                window.location.href = 'quiz.html';
            });
        }

        /* Switches between Sign In and Create Account tabs */
        function switchTab(tab) {
            if (tab === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.remove('active');
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
                document.querySelectorAll('.tab-btn')[0].classList.remove('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            }
        }

        /* Check if server is online when page loads */
        fetch('http://127.0.0.1:5000/api/health')
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (!data.success) {
                /* Show demo banner if server is not healthy */
                document.getElementById('demo-banner').style.display = 'block';
            }
        })
        .catch(function() {
            /* Server is offline - show demo banner */
            document.getElementById('demo-banner').style.display = 'block';
        });
    </script>

</body>
</html>
