<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Success Lobby - CPCC</title>
    <!-- Lobby page - cyberpunk/neon gaming style -->
    <style>
        /* Import a futuristic font from Google */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

        /* Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Dark cyberpunk background */
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #050d1a;
            color: white;
            min-height: 100vh;
            padding: 20px;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        }

        /* Neon glowing logo */
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            letter-spacing: 2px;
        }

        /* Header right side - profile link + user tag */
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-tag {
            font-size: 13px;
            color: #00ffff;
            border: 1px solid #00ffff;
            padding: 4px 12px;
            border-radius: 20px;
            box-shadow: 0 0 8px rgba(0,255,255,0.3);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-link {
            font-size: 12px;
            color: #90a4ae;
            text-decoration: none;
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
        }

        .profile-link:hover {
            color: #00ffff;
        }
        
        /* Section title */
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: #00ffff;
            margin-bottom: 16px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Course cards grid */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        /* Each course card */
        .course-card {
            background: linear-gradient(135deg, #0a1628, #0d2137);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .course-card:hover {
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Neon left border accent */
        .course-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #00ffff, #0066ff);
            box-shadow: 0 0 8px #00ffff;
        }

        .course-code {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #00ffff;
            margin-bottom: 4px;
            text-shadow: 0 0 8px rgba(0,255,255,0.5);
        }

        .course-name {
            font-size: 14px;
            color: #cdd9e5;
            margin-bottom: 14px;
        }

        /* Enter lobby button - same as original */
        .btn-join {
            width: 100%;
            margin-top: 14px;
            padding: 10px;
            background: transparent;
            border: 1px solid #00ffff;
            color: #00ffff;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.2s;
        }

        .btn-join:hover {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 12px rgba(0,255,255,0.3);
        }

        /* Green dot pulse */
        .active-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 6px #00ff88;
            animation: pulse 2s infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* No courses enrolled message */
        .empty-msg {
            text-align: center;
            padding: 40px 20px;
            color: #90a4ae;
            font-size: 14px;
        }

        .empty-msg a {
            color: #00ffff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="logo">⬡ SUCCESS LOBBY</div>
        <div class="header-right">
            <a href="/profile" class="profile-link">MY PROFILE</a>
            <div class="user-tag">
                <span class="active-dot"></span>
                <span id="display-user">STUDENT</span>
            </div>
        </div>
    </div>

    <div class="section-title">// My Active Lobbies</div>

    <!-- Course cards injected here by JavaScript -->
    <div class="courses-grid" id="courses-grid">
        <div class="empty-msg">Loading...</div>
    </div>

    <script>
        /* Get user info from localStorage */
        const userName = localStorage.getItem('cpcc-user') || 'STUDENT';
        const userEmail = localStorage.getItem('cpcc-email') || '';

        /* If not logged in send back to login */
        if (!userEmail) {
            window.location.href = '/';
        }

        /* Show name in header */
        document.getElementById('display-user').textContent = userName.toUpperCase();

        /* Load this student's courses and matching partners from the database */
        function loadLobby() {
            fetch(`http://127.0.0.1:5000/api/lobby?email=${userEmail}`)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                const grid = document.getElementById('courses-grid');

                if (!data.success) {
                    grid.innerHTML = '<div class="empty-msg">Could not load lobby.</div>';
                    return;
                }

                /* If student has no courses yet */
                if (data.courses.length === 0) {
                    grid.innerHTML = '<div class="empty-msg">You have no courses yet. <a href="/profile">Go to your profile</a> to add courses.</div>';
                    return;
                }

                grid.innerHTML = '';

                /* Create a card for each enrolled course */
                data.courses.forEach(function(course) {

                    /* Count how many patners have in lobby */
                    grid.innerHTML += `
                        <div class="course-card">
                            <div class="course-code">${course.code}</div>
                            <div class="course-name">${course.name}</div>
                            <div class="card-footer">
                                <div class="students-count">
                                    <div class="active-dot"></div>
                                    ${course.matches.length} students in lobby
                                </div>
                            </div>
                            <button class="btn-join" onclick="joinRoom('${course.code}')">
                                ENTER LOBBY
                            </button>
                        </div>
                    `;
                });
            })
            .catch(function() {
                document.getElementById('courses-grid').innerHTML =
                    '<div class="empty-msg">Cannot connect to server. Is app.py running?</div>';
            });
        }

        /* Save the course code and go to the room */
        function joinRoom(code) {
            localStorage.setItem('current-course', code);
            window.location.href = '/room';
        }

        /* Load the lobby when page opens */
        loadLobby();
    </script>

</body>
</html>
