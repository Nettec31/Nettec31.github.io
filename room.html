<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Room - Success Lobby</title>
    <!-- font -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

        /* Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Background */
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #050d1a;
            color: white;
            min-height: 100vh;
            padding: 20px;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            letter-spacing: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-tag {
            font-size: 13px;
            color: #00ffff;
            border: 1px solid #00ffff;
            padding: 4px 12px;
            border-radius: 20px;
            box-shadow: 0 0 8px rgba(0,255,255,0.3);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .back-link {
            font-size: 12px;
            color: #90a4ae;
            text-decoration: none;
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
        }

        .back-link:hover { color: #00ffff; }

        /* Green pulsing dot */
        .active-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 6px #00ff88;
            animation: pulse 2s infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Section title */
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: #00ffff;
            margin-bottom: 16px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Course info bar at the top of the page */
        .course-bar {
            background: linear-gradient(135deg, #0a1628, #0d2137);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
        }

        .course-bar-code {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #00ffff;
        }

        .course-bar-name {
            font-size: 14px;
            color: #90a4ae;
            margin-top: 4px;
        }

        /* Grid of match cards */
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        /* Each match card */
        .match-card {
            background: linear-gradient(135deg, #0a1628, #0d2137);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        /* Left accent border */
        .match-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #00ffff, #0066ff);
            box-shadow: 0 0 8px #00ffff;
        }

        /* Partner name at top of card */
        .partner-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        /* Small text under name */
        .partner-major {
            font-size: 13px;
            color: #90a4ae;
            margin-bottom: 14px;
        }

        /* Match percentage number */
        .match-pct {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 6px;
        }

        /* Color the percentage based on score */
        .pct-high  { color: #00ff88; }
        .pct-mid   { color: #00ffff; }
        .pct-low   { color: #ffc800; }
        .pct-none  { color: #90a4ae; }

        /* Progress bar background */
        .bar-bg {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            margin-bottom: 14px;
        }

        /* Filled part of the bar */
        .bar-fill {
            height: 100%;
            border-radius: 3px;
        }

        .fill-high { background: #00ff88; }
        .fill-mid  { background: #00ffff; }
        .fill-low  { background: #ffc800; }
        .fill-none { background: #2a3f55; }

        /* "Why you match" label */
        .reasons-label {
            font-size: 11px;
            color: #90a4ae;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        /* Each reason shown as a small tag */
        .reason-tag {
            display: inline-block;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 20px;
            margin: 3px 3px 3px 0;
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #00ffff;
            background: rgba(0, 255, 255, 0.06);
        }

        /* Info row showing availability and campus */
        .info-row {
            display: flex;
            gap: 10px;
            margin: 14px 0;
        }

        .info-pill {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(0, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }

        .info-pill-label {
            font-size: 10px;
            color: #3a5068;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .info-pill-val {
            font-size: 13px;
            color: #cdd9e5;
            margin-top: 3px;
            text-transform: capitalize;
        }

        /* Connect button */
        .btn-connect {
            width: 100%;
            margin-top: 4px;
            padding: 10px;
            background: transparent;
            border: 1px solid #00ffff;
            color: #00ffff;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.2s;
        }

        .btn-connect:hover {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 12px rgba(0,255,255,0.3);
        }

        /* Connected state - turns green */
        .btn-connect.connected {
            border-color: #00ff88;
            color: #00ff88;
        }

        /* No matches message */
        .empty-msg {
            text-align: center;
            padding: 40px 20px;
            color: #90a4ae;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="logo">⬡ SUCCESS LOBBY</div>
        <div class="header-right">
            <a href="/lobby" class="back-link">← LOBBY</a>
            <div class="user-tag">
                <span class="active-dot"></span>
                <span id="display-user">STUDENT</span>
            </div>
        </div>
    </div>

    <!-- Shows which course the student is in -->
    <div class="course-bar">
        <div class="course-bar-code" id="course-code">Loading...</div>
        <div class="course-bar-name" id="course-name"></div>
    </div>

    <div class="section-title">// Study Partner Matches</div>

    <!-- Match cards are injected here by JavaScript -->
    <div class="matches-grid" id="matches-grid">
        <div class="empty-msg">Loading matches...</div>
    </div>

    <script>
        /* Get the logged in user from localStorage */
        const userName = localStorage.getItem('cpcc-user') || 'STUDENT';
        const userEmail = localStorage.getItem('cpcc-email') || '';

        /* If not logged in, send back to login */
        if (!userEmail) {
            window.location.href = '/';
        }

        /* Get the course the student clicked in the lobby */
        const courseCode = localStorage.getItem('current-course') || '';

        /* If no course was selected, send back to lobby */
        if (!courseCode) {
            window.location.href = '/lobby';
        }

        /* Show name in header */
        document.getElementById('display-user').textContent = userName.toUpperCase();

        /* Max possible score - used to calculate the match percentage
           20 = major, 20 = availability, 20 = campus, 30 = AI bio = 100 total */
        const MAX_SCORE = 100;

        /* Load match data from the server */
        function loadRoom() {
            fetch(`http://127.0.0.1:5000/api/room?email=${userEmail}&course_code=${courseCode}`)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                const grid = document.getElementById('matches-grid');

                if (!data.success) {
                    grid.innerHTML = '<div class="empty-msg">Could not load matches.</div>';
                    return;
                }

                /* Show the course code and name */
                document.getElementById('course-code').textContent = data.course_code;
                document.getElementById('course-name').textContent = data.course_name || '';

                /* If no other students are in this course yet */
                if (data.matches.length === 0) {
                    grid.innerHTML = '<div class="empty-msg">No other students in this course yet.</div>';
                    return;
                }

                grid.innerHTML = '';

                /* Build a card for each matched student */
                data.matches.forEach(function(partner) {

                    /* Convert score to a 0-100 percentage */
                    const pct = Math.min(100, Math.round((partner.score / MAX_SCORE) * 100));

                    /* Pick colors based on how high the percentage is */
                    let pctClass, fillClass;
                    if (pct >= 60) {
                        pctClass = 'pct-high';
                        fillClass = 'fill-high';
                    } else if (pct >= 30) {
                        pctClass = 'pct-mid';
                        fillClass = 'fill-mid';
                    } else if (pct >= 10) {
                        pctClass = 'pct-low';
                        fillClass = 'fill-low';
                    } else {
                        pctClass = 'pct-none';
                        fillClass = 'fill-none';
                    }

                    /* Build the list of reason tags - these come from the server */
                    let reasonsHTML = '';
                    if (partner.reasons.length === 0) {
                        reasonsHTML = '<span class="reason-tag">Same Course</span>';
                    } else {
                        partner.reasons.forEach(function(reason) {
                            reasonsHTML += `<span class="reason-tag">${reason}</span>`;
                        });
                    }

                    /* Add the full match card to the grid */
                    grid.innerHTML += `
                        <div class="match-card">
                            <div class="partner-name">${partner.name}</div>
                            <div class="partner-major">${partner.major !== '—' ? partner.major : 'Major not set'}</div>

                            <div class="match-pct ${pctClass}">${pct}% Match</div>
                            <div class="bar-bg">
                                <div class="bar-fill ${fillClass}" style="width: ${pct}%"></div>
                            </div>

                            <div class="reasons-label">Why you match</div>
                            <div>${reasonsHTML}</div>

                            <div class="info-row">
                                <div class="info-pill">
                                    <div class="info-pill-label">Availability</div>
                                    <div class="info-pill-val">${partner.availability}</div>
                                </div>
                                <div class="info-pill">
                                    <div class="info-pill-label">Campus</div>
                                    <div class="info-pill-val">${partner.campus}</div>
                                </div>
                            </div>

                            <button class="btn-connect" onclick="connect(this, '${partner.name}', '${partner.email}')">
                                CONNECT →
                            </button>
                        </div>
                    `;
                });
            })
            .catch(function() {
                document.getElementById('matches-grid').innerHTML =
                    '<div class="empty-msg">Cannot connect to server. Is app.py running?</div>';
            });
        }

        /* Called when student clicks the Connect button */
        /* Called when student clicks the Connect button */
function connect(btn, partnerName, partnerEmail) {
    /* If already connected, do nothing */
    if (btn.classList.contains('connected')) return;

    /* Ask the student to confirm before connecting */
    const confirmed = confirm(`Send a connect request to ${partnerName}?\n\nThey will see your email: ${userEmail}`);

    if (confirmed) {
        fetch('http://127.0.0.1:5000/api/connect', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                from_email: userEmail,
                to_email: partnerEmail,
                course_code: courseCode
            })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.success) {
                btn.textContent = '✓ CONNECTED';
                btn.classList.add('connected');
            }
        });
    }
}

        /* Load the room when the page opens */
        loadRoom();
    </script>

</body>
</html>
